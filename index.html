<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모카네가계부 with Jiyoung&Chulhun</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            background-color: #0f172a; 
        }
        .animate-bounce-gentle { animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        input, select, textarea { font-size: 16px !important; appearance: none; -webkit-appearance: none; }
        .pb-safe { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 20px)); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .scroll-smooth { -webkit-overflow-scrolling: touch; }
        
        .popup-cheer { background: #14b8a6; box-shadow: 0 10px 30px rgba(20, 184, 166, 0.5); }
        .popup-warning { background: #f43f5e; box-shadow: 0 10px 30px rgba(244, 63, 94, 0.5); }
        .popup-info { background: #6366f1; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5); }
        .loader-ring { border-top-color: #2dd4bf; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useRef } = React;

        // Firebase SDK
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, doc, setDoc, updateDoc, deleteDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

        // --- 환경 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBve1WGTCzLUdNJRmeaOhlOrBnBg7yMhgk",
            authDomain: "mocha-money.firebaseapp.com",
            projectId: "mocha-money",
            storageBucket: "mocha-money.firebasestorage.app",
            messagingSenderId: "421934031399",
            appId: "1:421934031399:web:6c222b3f3288bf06d72402"
        };
            
        const appId = typeof __app_id !== 'undefined' ? __app_id : "mocha-money-app";

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase 초기화 에러:", e);
        }

        const LucideIcon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} style={{ display: 'contents' }}></span>;
        };

        const DEFAULT_ACCOUNTS = ['메인 급여통장', '비상금 통장', '청약 저축', '주식/투자 계좌', '기타'];

        const SpriteIcon = ({ size = 48, className = "" }) => {
            return (
                <div className={`shrink-0 flex items-center justify-center shadow-md bg-gradient-to-br from-amber-100 to-orange-200 border-2 border-white/50 ${className}`} style={{ width: size, height: size, borderRadius: '50%' }}>
                    <span style={{ fontSize: size * 0.55 }} className="drop-shadow-sm">🐶</span>
                </div>
            );
        };

        const fetchWithRetry = async (url, options, retries = 3) => {
            const delays = [1000, 2000, 4000];
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 20000); 
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        const errData = await response.json().catch(() => null);
                        const errMsg = errData?.error?.message || `HTTP error! status: ${response.status}`;
                        const errorObj = new Error(errMsg);
                        errorObj.status = response.status;
                        throw errorObj;
                    }
                    return await response.json();
                } catch (error) {
                    if (error.status === 400 || error.status === 403 || error.status === 404) throw error; 
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const objectUrl = URL.createObjectURL(file);
                img.onload = () => {
                    setTimeout(() => {
                        try {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 800; 
                            let width = img.width;
                            let height = img.height;
                            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                            URL.revokeObjectURL(objectUrl);
                            resolve(base64);
                        } catch (e) { URL.revokeObjectURL(objectUrl); reject(e); }
                    }, 50);
                };
                img.onerror = () => { URL.revokeObjectURL(objectUrl); reject(new Error("이미지 로드 실패")); };
                img.src = objectUrl;
            });
        };

        function App() {
            const [user, setUser] = useState(null);
            const [transactions, setTransactions] = useState([]);
            const [error, setError] = useState(null);
            const [isPermissionError, setIsPermissionError] = useState(false);
            
            const currentYear = new Date().getFullYear();
            const defaultGoal = { title: "1억 달성하기 💰", amount: 100000000, deadline: `${currentYear}-12-31` };
            const defaultBudgets = [
                { id: 1, category: '식비', amount: 600000, icon: '🍔' },
                { id: 2, category: '생활', amount: 300000, icon: '🛒' },
                { id: 3, category: '모카', amount: 150000, icon: '🐶' }
            ];
            
            const [settings, setSettings] = useState({ budgets: defaultBudgets, assetAccounts: DEFAULT_ACCOUNTS, goal: defaultGoal });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isAssetPageOpen, setIsAssetPageOpen] = useState(false);
            const [isGoalModalOpen, setIsGoalModalOpen] = useState(false);
            const [goalForm, setGoalForm] = useState(defaultGoal);
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            const [budgetForm, setBudgetForm] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isUploading, setIsUploading] = useState(false);
            
            const [aiKey, setAiKey] = useState('');
            const [isKeyModalOpen, setIsKeyModalOpen] = useState(false);

            const [mochaPopup, setMochaPopup] = useState({ show: false, message: '', type: 'info' });
            const [newAccountName, setNewAccountName] = useState('');
            const [editingAccount, setEditingAccount] = useState(null);
            const [editAccountName, setEditAccountName] = useState('');
            const fileInputRef = useRef(null);
            
            const incomeCategories = ['급여', '보너스', '부수입', '이자/배당', '환급금', '기타'];
            const expenseCategories = Array.from(new Set(['식비', '생활', '교통', '문화', '모카', '쇼핑', '의료', '통신', '기타', ...(settings.budgets || []).map(b => b.category)]));

            const [form, setForm] = useState({ type: 'expense', amount: '', category: expenseCategories[0], memo: '', date: new Date().toISOString().split('T')[0], account: DEFAULT_ACCOUNTS[0] });
            const [editTx, setEditTx] = useState(null);

            const showMochaNotification = (message, type = 'info') => {
                setMochaPopup({ show: true, message, type });
                setTimeout(() => setMochaPopup({ show: false, message: '', type: 'info' }), 4000);
            };

            // 인증 로직
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) { await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }
                };
                initAuth();
                const unsubAuth = onAuthStateChanged(auth, (u) => { setUser(u); if(u) setIsPermissionError(false); });
                return () => unsubAuth();
            }, []);

            // 데이터 실시간 동기화 (6단계 경로 준수)
            useEffect(() => {
                if (!user || !db) return;
                const ledgerRef = collection(db, 'artifacts', appId, 'public', 'data', 'ledger');
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                const secretsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'secrets', 'key');
                
                const unsubTx = onSnapshot(ledgerRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setTransactions(data);
                    setLoading(false);
                }, (err) => { 
                    if(err.code === 'permission-denied') setIsPermissionError(true);
                    setLoading(false); 
                });

                const unsubSet = onSnapshot(settingsRef, (snap) => {
                    if (snap.exists()) {
                        setSettings({
                            budgets: snap.data().budgets || defaultBudgets,
                            assetAccounts: snap.data().assetAccounts || DEFAULT_ACCOUNTS,
                            goal: snap.data().goal || defaultGoal
                        });
                    }
                });

                const unsubSec = onSnapshot(secretsRef, (snap) => {
                    if (snap.exists() && snap.data().geminiKey) setAiKey(snap.data().geminiKey);
                });

                return () => { unsubTx(); unsubSet(); unsubSec(); };
            }, [user, appId]);

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [activeTab, loading, isGoalModalOpen, isBudgetModalOpen, isAssetPageOpen, isKeyModalOpen, editTx, error]);

            const monthIncome = transactions.filter(t => t.type === 'income' && t.date?.startsWith(new Date().toISOString().slice(0, 7))).reduce((s, t) => s + (Number(t.amount)||0), 0);
            const monthExpense = transactions.filter(t => t.type === 'expense' && t.date?.startsWith(new Date().toISOString().slice(0, 7))).reduce((s, t) => s + (Number(t.amount)||0), 0);
            const totalSavings = transactions.reduce((s, t) => s + (t.type === 'income' ? 1 : -1) * (Number(t.amount)||0), 0);
            const goalProgress = Math.min(100, Math.max(0, (totalSavings / (settings.goal?.amount || 1)) * 100));

            const accountBalances = settings.assetAccounts.reduce((acc, name) => {
                const accTx = transactions.filter(t => t.account === name);
                acc[name] = accTx.reduce((s, t) => s + (t.type === 'income' ? 1 : -1) * (Number(t.amount)||0), 0);
                return acc;
            }, {});

            const currentCategories = form.type === 'income' ? incomeCategories : expenseCategories;

            const handleManualSubmit = async (e) => {
                e.preventDefault();
                if (!user || !form.amount || !form.memo) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ledger'), { ...form, amount: Number(form.amount), timestamp: new Date().toISOString(), uid: user.uid });
                    showMochaNotification("기록 완료! ✨", "info");
                    setForm({ ...form, amount: '', memo: '', date: new Date().toISOString().split('T')[0] });
                    setActiveTab('list');
                } catch(e) { showMochaNotification("저장 실패!", "warning"); }
            };

            const handleUpdateTx = async (e) => {
                e.preventDefault();
                if (!db || !editTx) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ledger', editTx.id), { ...editTx, amount: Number(editTx.amount) });
                    showMochaNotification("수정 완료! 🐾", "info"); setEditTx(null);
                } catch(e) { showMochaNotification("수정 실패!", "warning"); }
            };

            const handleDeleteTx = async () => {
                if (!db || !editTx) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ledger', editTx.id));
                    showMochaNotification("기록 삭제됨! 🗑️", "info"); setEditTx(null);
                } catch(e) { showMochaNotification("삭제 실패!", "warning"); }
            };

            const handleSaveAiKey = async () => {
                if (!db || !user || !aiKey) return;
                try {
                    const cleanedKey = aiKey.trim().replace(/^API\s*Key:\s*/i, '');
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'secrets', 'key'), { geminiKey: cleanedKey }, { merge: true });
                    setIsKeyModalOpen(false);
                    showMochaNotification("AI 열쇠 장착 완료! 🔑", "cheer");
                    setError(null);
                } catch(e) { showMochaNotification("저장 실패!", "warning"); }
            };

            const handleFileUpload = (e) => {
                if (!aiKey) { e.preventDefault(); setIsKeyModalOpen(true); return; }
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                showMochaNotification("모카가 영수증 분석 중이다멍! 🔍", "info");
                setTimeout(async () => {
                    try {
                        const base64Data = await compressImage(file);
                        // 💡 [404 해결] v1beta 대신 정식 v1 엔드포인트 사용
                        const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${aiKey.trim()}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [
                                    { text: "Extract receipt info. Reply ONLY with valid JSON. Keys: amount (int), date (YYYY-MM-DD), memo (str), category (str). Categories: 식비, 생활, 교통, 문화, 모카, 쇼핑, 의료, 통신, 기타." },
                                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                                ]}],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        if(!result.candidates || !result.candidates[0].content) throw new Error("AI 응답 없음");
                        
                        const data = JSON.parse(result.candidates[0].content.parts[0].text);
                        let finalCategory = data.category || '기타';
                        if (data.memo?.includes('마트') || data.memo?.includes('식당')) finalCategory = '식비';
                        
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ledger'), {
                            type: 'expense', amount: Number(data.amount) || 0, memo: data.memo || '영수증 지출',
                            date: data.date || new Date().toISOString().split('T')[0], category: finalCategory,
                            account: settings.assetAccounts[0], timestamp: new Date().toISOString(),
                            uid: user.uid, isAuto: true
                        });
                        showMochaNotification("영수증 등록 완료! ✨", "cheer");
                        setActiveTab('list');
                    } catch (e) {
                        setError(`AI 연동 에러: ${e.message}`);
                        if (e.status === 400 || e.status === 403 || e.status === 404) setIsKeyModalOpen(true);
                    } finally { setIsUploading(false); if(fileInputRef.current) fileInputRef.current.value = ''; }
                }, 100);
            };

            const handleAddAmount = (val) => setForm({...form, amount: String((Number(form.amount)||0) + val)});

            if (loading && !error) return (
                <div className="flex flex-col items-center justify-center h-screen bg-slate-900 gap-6 text-teal-400 font-bold">
                    <div className="w-16 h-16 border-4 border-slate-700 rounded-full loader-ring"></div>
                    <p>모카가 가계부를 열고 있다멍!</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-900 shadow-2xl relative scroll-smooth overflow-x-hidden">
                    <header className="px-6 pt-12 pb-4 flex flex-col items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-800 text-center">
                        <h1 className="flex flex-col items-center gap-1.5">
                            <span className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400">✨ 모카네가계부</span>
                            <span className="text-sm font-bold text-teal-200/90 flex items-center justify-center gap-1.5 tracking-wide">with Jiyoung <span className="text-rose-400 animate-pulse">❤️</span> Chulhun</span>
                        </h1>
                    </header>

                    <main className="flex-1 p-5 space-y-7 overflow-y-auto pb-32 hide-scrollbar bg-gradient-to-br from-slate-900 via-slate-800 to-teal-950/20">
                        {isPermissionError && (
                            <div className="p-5 bg-rose-500/10 border border-rose-500/30 rounded-[24px] flex items-start gap-4 text-sm text-slate-300">
                                <LucideIcon name="alert-circle" className="text-rose-400 shrink-0 mt-1" />
                                <p>앗! 데이터베이스 문이 잠겨있다멍! 파이어베이스 규칙을 if true; 로 고쳐주세요.</p>
                            </div>
                        )}
                        {!isPermissionError && error && (
                            <div className="p-5 bg-rose-500/10 border border-rose-500/30 rounded-[24px] flex items-start gap-4 text-sm">
                                <LucideIcon name="alert-circle" className="text-rose-400 shrink-0 mt-1" />
                                <div className="flex-1">
                                    <p className="font-bold text-rose-400 mb-1">에러 발생!</p>
                                    <p className="text-slate-400 break-all mb-3 text-xs leading-relaxed">{error}</p>
                                    <button onClick={() => setError(null)} className="bg-rose-500/20 text-rose-300 px-3 py-1.5 rounded-lg font-bold">닫기</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-7 animate-in fade-in duration-500">
                                <div className="bg-gradient-to-br from-teal-600 to-sky-700 rounded-[28px] p-6 shadow-xl relative text-left overflow-hidden">
                                    <div className="flex justify-between items-start mb-5">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-2"><p className="text-teal-100 text-sm font-bold">{settings.goal?.title}</p><button onClick={() => { setGoalForm(settings.goal); setIsGoalModalOpen(true); }} className="text-white/60"><LucideIcon name="settings" className="w-4 h-4" /></button></div>
                                            <h2 className="text-4xl font-black">{new Intl.NumberFormat('ko-KR').format(totalSavings)}원</h2>
                                        </div>
                                        <SpriteIcon size={64} />
                                    </div>
                                    <div className="w-full bg-slate-900/40 rounded-full h-3 mb-2 shadow-inner"><div className="bg-yellow-400 h-full rounded-full relative transition-all duration-1000" style={{width: `${goalProgress}%`}}><div className="absolute -right-3 -top-2 text-xl animate-bounce-gentle">🐶</div></div></div>
                                    <div className="flex justify-between text-xs font-bold text-teal-50"><span>{new Intl.NumberFormat('ko-KR').format(settings.goal?.amount)}원 목표</span><span>{goalProgress.toFixed(1)}% 달성</span></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-left">
                                    <div className="bg-slate-800/90 p-5 rounded-[24px] border border-slate-700 flex flex-col gap-2"><p className="text-sky-400 text-xs font-bold flex items-center gap-1"><LucideIcon name="arrow-down-circle" className="w-4 h-4" /> 이번 달 수입</p><p className="text-xl font-bold">{new Intl.NumberFormat('ko-KR').format(monthIncome)}원</p></div>
                                    <div className="bg-slate-800/90 p-5 rounded-[24px] border border-slate-700 flex flex-col gap-2"><p className="text-rose-400 text-xs font-bold flex items-center gap-1"><LucideIcon name="arrow-up-circle" className="w-4 h-4" /> 이번 달 지출</p><p className="text-xl font-bold">{new Intl.NumberFormat('ko-KR').format(monthExpense)}원</p></div>
                                </div>
                                <button onClick={() => setIsAssetPageOpen(true)} className="w-full py-5 rounded-[24px] flex items-center justify-between px-6 font-bold border border-slate-700 bg-slate-800 active:scale-95 transition-all text-teal-400 text-lg shadow-md"><span className="flex items-center gap-3"><LucideIcon name="building-2" className="w-6 h-6" /> 내 자산 관리</span><LucideIcon name="chevron-right" className="w-5 h-5 text-slate-400" /></button>
                                <div className="bg-slate-800/90 rounded-[28px] p-6 border border-slate-700 shadow-lg text-left">
                                    <div className="flex justify-between items-center mb-6 font-bold text-base"><span className="flex items-center gap-2"><SpriteIcon size={28} /> 집중 방어 구역</span><button onClick={() => { setBudgetForm(settings.budgets); setIsBudgetModalOpen(true); }} className="text-slate-400"><LucideIcon name="settings" className="w-5 h-5" /></button></div>
                                    <div className="space-y-5">
                                        {settings.budgets.map((b) => {
                                            const spent = transactions.filter(t => t.type === 'expense' && t.category === b.category && t.date?.startsWith(new Date().toISOString().slice(0, 7))).reduce((s, t) => s + Number(t.amount), 0);
                                            const percent = Math.min(100, (spent / (b.amount || 1)) * 100);
                                            return (<div key={b.id} className="space-y-2"><div className="flex justify-between text-sm font-bold"><span>{b.icon} {b.category}</span><span className={spent > b.amount ? 'text-rose-400' : 'text-teal-400'}>{new Intl.NumberFormat('ko-KR').format(spent)} / {new Intl.NumberFormat('ko-KR').format(b.amount)}</span></div><div className="h-3 bg-slate-900 rounded-full overflow-hidden border border-slate-700/50"><div className={`h-full rounded-full transition-all duration-500 ${spent > b.amount ? 'bg-rose-500' : 'bg-teal-500'}`} style={{width: `${percent}%`}}></div></div></div>);
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <div className="space-y-7 animate-in zoom-in-95 duration-300 pt-2 text-left text-slate-100">
                                <h3 className="font-black text-3xl mb-4">기록하기 ✍️</h3>
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 rounded-[28px] shadow-xl relative flex items-center justify-between">
                                    <div className="pr-4"><p className="font-black text-white text-lg mb-1 flex items-center gap-2">영수증 자동 기록 <LucideIcon name="camera" className="w-5 h-5" /></p><p className="text-sm text-indigo-200">AI 모카가 자동으로 척척!</p></div>
                                    <button type="button" onClick={() => aiKey ? fileInputRef.current?.click() : setIsKeyModalOpen(true)} disabled={isUploading} className="shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-indigo-600 shadow-lg active:scale-90 transition-all">
                                        {isUploading ? <div className="w-6 h-6 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div> : <LucideIcon name="image-plus" className="w-7 h-7" />}
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*" className="hidden" />
                                </div>
                                <div className="flex items-center my-6"><div className="flex-1 border-t border-slate-700"></div><span className="px-4 text-slate-500 text-sm font-bold">직접 입력</span><div className="flex-1 border-t border-slate-700"></div></div>
                                <form onSubmit={handleManualSubmit} className="space-y-5">
                                    <div className="flex bg-slate-800 p-1.5 rounded-2xl border border-slate-700 shadow-inner">
                                        <button type="button" onClick={() => setForm({...form, type: 'expense', category: expenseCategories[0]})} className={`flex-1 py-3.5 rounded-xl text-lg font-black transition-all ${form.type === 'expense' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-400'}`}>지출</button>
                                        <button type="button" onClick={() => setForm({...form, type: 'income', category: incomeCategories[0]})} className={`flex-1 py-3.5 rounded-xl text-lg font-black transition-all ${form.type === 'income' ? 'bg-sky-500 text-white shadow-md' : 'text-slate-400'}`}>수입</button>
                                    </div>
                                    <div className="space-y-4 text-slate-200">
                                        <div className="relative"><LucideIcon name="wallet" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" /><select value={form.account} onChange={e => setForm({...form, account: e.target.value})} className="w-full pl-12 pr-4 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none">{settings.assetAccounts.map(acc => <option key={acc} value={acc}>{acc}</option>)}</select></div>
                                        <div className="relative"><span className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">원</span><input type="number" placeholder="금액" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} className="w-full pl-5 pr-10 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none text-xl font-black" required /></div>
                                        <div className="flex gap-2"><button type="button" onClick={() => handleAddAmount(1000)} className="flex-1 bg-slate-700 py-2.5 rounded-xl text-xs font-bold active:scale-95 transition-all">+1천</button><button type="button" onClick={() => handleAddAmount(10000)} className="flex-1 bg-slate-700 py-2.5 rounded-xl text-xs font-bold active:scale-95 transition-all">+1만</button><button type="button" onClick={() => handleAddAmount(50000)} className="flex-1 bg-slate-700 py-2.5 rounded-xl text-xs font-bold active:scale-95 transition-all">+5만</button><button type="button" onClick={() => setForm({...form, amount: ''})} className="flex-1 bg-rose-500/20 text-rose-300 py-2.5 rounded-xl text-xs font-bold active:scale-95 transition-all">정정</button></div>
                                        <input type="text" placeholder="내용 입력" value={form.memo} onChange={e => setForm({...form, memo: e.target.value})} className="w-full px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none" required />
                                        <div className="grid grid-cols-2 gap-4">
                                            <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none">{currentCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select>
                                            <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none" required />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full mt-8 py-5 h-16 bg-teal-500 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">기록 저장하기 🐶</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-5 animate-in slide-in-from-right-4 duration-300 pt-2 text-left">
                                <h3 className="font-black text-3xl mb-6 text-slate-100">최근 기록장 📑</h3>
                                {transactions.length === 0 ? <div className="text-center py-20 text-slate-500">기록이 없다멍!</div> : transactions.map(t => (
                                    <div key={t.id} onClick={() => setEditTx(t)} className="bg-slate-800 p-5 rounded-[24px] border border-slate-700 shadow-md flex justify-between items-center active:scale-95 transition-transform group cursor-pointer">
                                        <div className="flex-1 pr-4">
                                            <div className="flex items-center gap-2 mb-1.5"><p className="text-[11px] text-slate-400 font-bold">{t.date}</p><span className="text-[10px] bg-slate-900 px-2 py-0.5 rounded-full text-slate-300">{t.account}</span></div>
                                            <p className="font-bold text-slate-100 text-[17px] mb-1.5 leading-tight">{t.memo} {t.isAuto && <span className="text-[10px] bg-indigo-500/20 text-indigo-300 px-1.5 py-0.5 rounded ml-1 font-bold">✨ AI</span>}</p>
                                            <span className="text-[11px] bg-teal-500/10 text-teal-300 px-2.5 py-1 rounded-md font-bold">{t.category}</span>
                                        </div>
                                        <p className={`text-xl font-black shrink-0 ${t.type === 'income' ? 'text-sky-400' : 'text-rose-400'}`}>{t.type === 'income' ? '+' : '-'}{new Intl.NumberFormat('ko-KR').format(t.amount)}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* AI 열쇠 입력 모달 */}
                    {isKeyModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-slate-800 border border-teal-500/30 p-7 rounded-[32px] shadow-2xl w-full max-w-md text-left text-slate-100">
                                <h3 className="font-black text-2xl mb-4 flex items-center gap-2">🔑 AI 전용 열쇠 입력</h3>
                                <p className="text-sm text-slate-300 mb-5 leading-relaxed">
                                    영수증 분석을 위해 구글 AI 전용 열쇠가 필요합니다. <b>두 번째 키(..._NAk)</b>를 넣어주세요!<br/>
                                    <span className="text-rose-400 font-bold">※ 데이터베이스용 키와 AI용 키는 서로 다릅니다!</span>
                                </p>
                                <a href="https://aistudio.google.com/app/apikey" target="_blank" className="bg-slate-900 text-teal-400 px-4 py-3 rounded-xl text-xs font-bold block text-center mb-6 border border-teal-500/30">👉 여기를 눌러 AI Studio 키 발급받기</a>
                                <input type="text" value={aiKey} onChange={e => setAiKey(e.target.value)} placeholder="AIzaSy... 로 시작하는 키 붙여넣기" className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 mb-6 shadow-inner" />
                                <div className="flex gap-3"><button onClick={() => setIsKeyModalOpen(false)} className="flex-1 py-4 bg-slate-700 text-slate-300 rounded-2xl font-bold">취소</button><button onClick={handleSaveAiKey} className="flex-[2] py-4 bg-teal-500 text-white rounded-2xl font-black text-lg">열쇠 저장하기</button></div>
                            </div>
                        </div>
                    )}

                    {/* 수정/삭제 모달 */}
                    {editTx && (
                        <div className="fixed inset-0 z-[90] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-slate-800 border border-slate-700 p-6 rounded-[32px] shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto flex flex-col text-left text-slate-100">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-2xl">기록 수정 ✍️</h3><button onClick={() => setEditTx(null)} className="text-slate-400 p-1"><LucideIcon name="x" className="w-6 h-6" /></button></div>
                                <form onSubmit={handleUpdateTx} className="space-y-4">
                                    <div className="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-700">
                                        <button type="button" onClick={() => setEditTx({...editTx, type: 'expense', category: expenseCategories[0]})} className={`flex-1 py-3.5 rounded-xl text-lg font-black ${editTx.type === 'expense' ? 'bg-rose-500 text-white' : 'text-slate-400'}`}>지출</button>
                                        <button type="button" onClick={() => setEditTx({...editTx, type: 'income', category: incomeCategories[0]})} className={`flex-1 py-3.5 rounded-xl text-lg font-black ${editTx.type === 'income' ? 'bg-sky-500 text-white' : 'text-slate-400'}`}>수입</button>
                                    </div>
                                    <div className="relative"><LucideIcon name="wallet" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" /><select value={editTx.account} onChange={e => setEditTx({...editTx, account: e.target.value})} className="w-full pl-12 pr-4 py-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-slate-200 outline-none">{settings.assetAccounts.map(acc => <option key={acc} value={acc}>{acc}</option>)}</select></div>
                                    <div className="relative"><span className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">원</span><input type="number" value={editTx.amount} onChange={e => setEditTx({...editTx, amount: e.target.value})} className="w-full pl-5 pr-10 py-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 outline-none text-xl font-black" required /></div>
                                    <input type="text" value={editTx.memo} onChange={e => setEditTx({...editTx, memo: e.target.value})} className="w-full px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-600 outline-none" required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select value={editTx.category} onChange={e => setEditTx({...editTx, category: e.target.value})} className="px-5 py-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-slate-200 outline-none">{(editTx.type === 'income' ? incomeCategories : expenseCategories).map(cat => <option key={cat} value={cat}>{cat}</option>)}</select>
                                        <input type="date" value={editTx.date} onChange={e => setEditTx({...editTx, date: e.target.value})} className="px-5 py-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-slate-200 outline-none" required />
                                    </div>
                                    <div className="flex gap-3 mt-6"><button type="button" onClick={handleDeleteTx} className="py-4 px-5 bg-rose-500/20 text-rose-400 rounded-2xl font-black text-lg flex items-center justify-center"><LucideIcon name="trash-2" className="w-6 h-6" /></button><button type="submit" className="flex-1 py-4 bg-teal-500 text-white rounded-2xl font-black text-lg">수정 완료</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 자산 관리 모달 */}
                    {isAssetPageOpen && <div className="fixed inset-0 z-[60] bg-slate-900 overflow-y-auto p-6 pt-12 animate-in slide-in-from-bottom duration-300 text-slate-100"><button onClick={() => setIsAssetPageOpen(false)} className="mb-6 flex items-center gap-2 text-teal-400 font-bold py-2"><LucideIcon name="arrow-left" /> 돌아가기</button><h2 className="text-3xl font-black mb-8 text-left">내 자산 리스트 💰</h2><div className="flex gap-2 mb-8"><input type="text" placeholder="새 자산 추가" value={newAccountName} onChange={(e) => setNewAccountName(e.target.value)} className="flex-1 p-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 text-slate-100 outline-none focus:border-teal-500" /><button onClick={() => { if(!newAccountName) return; setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { ...settings, assetAccounts: [...settings.assetAccounts, newAccountName] }, { merge: true }); setNewAccountName(''); }} className="bg-teal-500 text-white px-6 h-14 rounded-2xl font-bold shadow-lg">추가</button></div><div className="space-y-4 pb-20">{settings.assetAccounts.map(acc => <div key={acc} className="p-5 bg-slate-800 border border-slate-700 rounded-[24px] flex flex-col gap-3 shadow-lg"><div className="flex justify-between items-center w-full"><div className="flex items-center gap-3.5"><div className="w-12 h-12 bg-slate-900 border border-slate-700 rounded-full flex items-center justify-center text-2xl shadow-inner">🏦</div><span className="font-bold">{acc}</span></div><span className="text-xl font-black text-teal-400">{new Intl.NumberFormat('ko-KR').format(accountBalances[acc]||0)}원</span></div><div className="flex justify-end gap-4 mt-2 border-t border-slate-700/80 pt-3.5"><button onClick={() => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { ...settings, assetAccounts: settings.assetAccounts.filter(a => a !== acc) }, { merge: true })} className="text-slate-400 text-xs font-bold uppercase">삭제</button></div></div>)}</div></div>}
                    
                    {/* 목표 설정 모달 */}
                    {isGoalModalOpen && <div className="fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-5"><div className="bg-slate-800 border border-slate-700 p-7 rounded-[32px] shadow-2xl w-full max-w-sm text-slate-100"><h3 className="font-black text-xl mb-6 text-left">🎯 우리 가족 목표 설정</h3><form onSubmit={(e) => { e.preventDefault(); setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { ...settings, goal: goalForm }, { merge: true }); setIsGoalModalOpen(false); }} className="space-y-5 text-left text-slate-200"><div><label className="text-xs text-slate-400 font-bold mb-2 block uppercase tracking-wider">목표 내용</label><input type="text" value={goalForm.title} onChange={e => setGoalForm({...goalForm, title: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none" required /></div><div><label className="text-xs text-slate-400 font-bold mb-2 block uppercase tracking-wider">목표 금액</label><input type="number" value={goalForm.amount} onChange={e => setGoalForm({...goalForm, amount: Number(e.target.value)})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none font-bold" required /></div><div className="flex gap-3 mt-4"><button type="button" onClick={() => setIsGoalModalOpen(false)} className="flex-1 py-4 bg-slate-700 rounded-2xl font-bold">취소</button><button type="submit" className="flex-1 py-4 bg-teal-500 text-white rounded-2xl font-black">저장</button></div></form></div></div>}

                    {/* 하단 탭 바 */}
                    <div className="fixed bottom-0 left-0 right-0 z-50 pointer-events-none pb-safe">
                        <nav className="max-w-md mx-auto pointer-events-auto bg-slate-800/90 backdrop-blur-xl border border-slate-700/50 shadow-2xl m-4 rounded-[32px] p-2 flex justify-around items-center">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 w-20 py-2 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'text-teal-400 bg-slate-700/50' : 'text-slate-500'}`}><LucideIcon name="layout-dashboard" className="w-6 h-6" /><span className="text-[11px] font-bold">홈</span></button>
                            <button onClick={() => setActiveTab('add')} className="relative -top-8 bg-gradient-to-tr from-teal-600 to-teal-400 w-16 h-16 rounded-full flex items-center justify-center border-4 border-slate-900 shadow-xl active:scale-90 transition-transform"><LucideIcon name="plus" className="text-white w-8 h-8" /></button>
                            <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 w-20 py-2 rounded-2xl transition-all ${activeTab === 'list' ? 'text-teal-400 bg-slate-700/50' : 'text-slate-500'}`}><LucideIcon name="list" className="w-6 h-6" /><span className="text-[11px] font-bold">기록장</span></button>
                        </nav>
                    </div>

                    {/* 팝업 알림 */}
                    {mochaPopup.show && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[110] w-[85%] max-w-[320px] animate-in slide-in-from-top fade-in pointer-events-none">
                            <div className={`p-5 rounded-3xl flex items-center gap-4 text-white font-bold relative overflow-hidden ${mochaPopup.type === 'cheer' ? 'popup-cheer' : mochaPopup.type === 'warning' ? 'popup-warning' : 'popup-info'}`}>
                                <SpriteIcon size={44} className="border-2 border-white/30" />
                                <p className="text-[15px] leading-relaxed break-keep">{mochaPopup.message}</p>
                                <div className="absolute -right-2 -bottom-2 opacity-20"><LucideIcon name={mochaPopup.type === 'warning' ? 'alert-triangle' : 'sparkles'} className="w-12 h-12" /></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
