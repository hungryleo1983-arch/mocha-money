        // 구글 AI 서버의 에러 메시지를 가로채는 통신 로직
        const fetchWithRetry = async (url, options, retries = 3) => {
            const delays = [1000, 2000, 4000];
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000); 
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        const errData = await response.json().catch(() => null);
                        const errMsg = errData?.error?.message || `HTTP error! status: ${response.status}`;
                        const errorObj = new Error(errMsg);
                        errorObj.status = response.status;
                        throw errorObj;
                    }
                    return await response.json();
                } catch (error) {
                    if (error.status === 400 || error.status === 403) throw error; // 권한 에러는 재시도 안 함
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const objectUrl = URL.createObjectURL(file);
                
                img.onload = () => {
                    setTimeout(() => {
                        try {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 800; 
                            let width = img.width;
                            let height = img.height;

                            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                            URL.revokeObjectURL(objectUrl);
                            resolve(base64);
                        } catch (e) {
                            URL.revokeObjectURL(objectUrl);
                            reject(e);
                        }
                    }, 50);
                };
                img.onerror = (e) => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("이미지 로드 실패"));
                };
                img.src = objectUrl;
            });
        };

            // 💡 [오류 원인 노출] AI 기술 오류 시 구체적인 이유를 상단 배너에 출력하도록 변경
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setIsUploading(true);
                showMochaNotification("모카가 영수증을 뚫어져라 보고 있다멍! 🐶🔍", "info");

                setTimeout(async () => {
                    try {
                        const base64Data = await compressImage(file);
                        const modelName = apiKey === "" ? "gemini-2.5-flash-preview-09-2025" : "gemini-1.5-flash";

                        const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    role: "user",
                                    parts: [
                                        { text: "Extract receipt info and reply ONLY with valid JSON. Do NOT include markdown blocks. Example format: {\"amount\": 5000, \"date\": \"2024-05-19\", \"memo\": \"커피\", \"category\": \"식비\"}" },
                                        { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                                    ]
                                }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if(!result.candidates || !result.candidates[0].content) {
                            throw new Error("AI가 응답 데이터를 주지 않았습니다.");
                        }

                        let rawText = result.candidates[0].content.parts[0].text;
                        let cleanedJson = rawText.replace(/```json/gi, "").replace(/```/g, "").trim();
                        const jsonMatch = cleanedJson.match(/\{[\s\S]*\}/);
                        if(jsonMatch) cleanedJson = jsonMatch[0];

                        const data = JSON.parse(cleanedJson);
                        const parsedAmount = Number(data.amount) || 0;

                        let finalCategory = data.category || '기타';
                        if (!expenseCategories.includes(finalCategory)) {
                            if (data.memo && (data.memo.includes('마트') || data.memo.includes('식당') || data.memo.includes('밥'))) finalCategory = '식비';
                            else if (data.memo && (data.memo.includes('모카') || data.memo.includes('간식') || data.memo.includes('동물'))) finalCategory = '모카';
                            else finalCategory = '기타';
                        }

                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ledger'), {
                            type: 'expense',

                            memo: data.memo || '영수증 지출',

                            account: settings.assetAccounts[0],

                            uid: user.uid,
                            isAuto: true

                                    </div>
                                    <div className="flex gap-3 mt-6">
                                        <button type="button" onClick={handleDeleteTx} className="py-4 px-5 bg-rose-500/20 text-rose-400 rounded-2xl font-black text-lg active:scale-95 transition-all flex items-center justify-center"><LucideIcon name="trash-2" className="w-6 h-6" /></button>
                                        <button type="submit" className="flex-1 py-4 bg-teal-500 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">수정 완료</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 오버레이 모달들 */}
                    {isAssetPageOpen && <div className="fixed inset-0 z-[60] bg-slate-900 overflow-y-auto p-6 pt-12 animate-in slide-in-from-bottom duration-300"><button onClick={() => setIsAssetPageOpen(false)} className="mb-6 flex items-center gap-2 text-teal-400 font-bold py-2"><LucideIcon name="arrow-left" /> 대시보드로 돌아가기</button><h2 className="text-3xl font-black mb-8">내 자산 리스트 💰</h2><div className="flex gap-2 mb-8"><input type="text" placeholder="새 자산 추가" value={newAccountName} onChange={(e) => setNewAccountName(e.target.value)} className="flex-1 p-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 text-slate-100 focus:border-teal-500 outline-none shadow-inner" /><button onClick={handleAddAccount} className="bg-teal-500 text-white px-6 h-14 rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">추가</button></div><div className="space-y-4 pb-20">{settings.assetAccounts.map(acc => <div key={acc} className="p-5 bg-slate-800 border border-slate-700 rounded-[24px] flex flex-col gap-3 shadow-lg">{editingAccount === acc ? <div className="flex gap-2 w-full"><input type="text" value={editAccountName} onChange={(e) => setEditAccountName(e.target.value)} className="flex-1 p-3 h-12 rounded-xl bg-slate-900 border border-slate-600 text-slate-100 outline-none" autoFocus /><button onClick={() => handleEditAccount(acc)} className="bg-teal-500 text-white w-12 h-12 rounded-xl shadow-md flex items-center justify-center"><LucideIcon name="check" className="w-5 h-5" /></button><button onClick={() => setEditingAccount(null)} className="bg-slate-600 text-white w-12 h-12 rounded-xl flex items-center justify-center"><LucideIcon name="x" className="w-5 h-5" /></button></div> : <><div className="flex justify-between items-center w-full"><div className="flex items-center gap-3.5"><div className="w-12 h-12 bg-slate-900 border border-slate-700 rounded-full flex items-center justify-center text-2xl shadow-inner">🏦</div><span className="font-bold text-[17px]">{acc}</span></div><span className="text-xl font-black text-teal-400">{new Intl.NumberFormat('ko-KR').format(accountBalances[acc]||0)}원</span></div><div className="flex justify-end gap-4 mt-2 border-t border-slate-700/80 pt-3.5"><button onClick={() => { setEditingAccount(acc); setEditAccountName(acc); }} className="text-slate-400 hover:text-teal-400 flex items-center gap-1.5 text-sm font-bold p-1"><LucideIcon name="edit-2" className="w-4 h-4" /> 수정</button><button onClick={() => handleDeleteAccount(acc)} className="text-slate-400 hover:text-rose-400 flex items-center gap-1.5 text-sm font-bold p-1"><LucideIcon name="trash-2" className="w-4 h-4" /> 삭제</button></div></>}</div>)}</div></div>}
                    {isGoalModalOpen && <div className="fixed inset-0 z-[70] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-5 animate-in fade-in"><div className="bg-slate-800 border border-slate-700 p-7 rounded-[32px] shadow-2xl w-full max-w-sm"><div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-left">🎯 우리가족 목표 설정</h3><button onClick={() => setIsGoalModalOpen(false)} className="text-slate-400 hover:text-white p-1"><LucideIcon name="x" /></button></div><form onSubmit={handleSaveGoal} className="space-y-5 text-left"><div><label className="text-sm text-slate-300 font-bold mb-2 block">어떤 목표인가요?</label><input type="text" value={goalForm.title} onChange={e => setGoalForm({...goalForm, title: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 shadow-inner" required /></div><div><label className="text-sm text-slate-300 font-bold mb-2 block">목표 금액 (원)</label><input type="number" value={goalForm.amount} onChange={e => setGoalForm({...goalForm, amount: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 font-bold text-lg shadow-inner" required /></div><div><label className="text-sm text-slate-300 font-bold mb-2 block">목표 날짜</label><input type="date" value={goalForm.deadline} onChange={e => setGoalForm({...goalForm, deadline: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 shadow-inner" required /></div><button type="submit" className="w-full bg-teal-500 text-white font-black text-xl py-4 h-16 rounded-2xl mt-4 active:scale-95 transition-transform shadow-lg">저장하기 🐾</button></form></div></div>}
                    {isBudgetModalOpen && <div className="fixed inset-0 z-[70] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in pt-safe"><div className="bg-slate-800 border border-slate-700 p-6 rounded-[32px] shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col"><div className="flex justify-between items-center mb-6 shrink-0 pt-2 text-left"><h3 className="font-black text-2xl flex items-center gap-2">🛡️ 예산 방어 설정</h3><button onClick={() => setIsBudgetModalOpen(false)} className="text-slate-400 hover:text-white p-1"><LucideIcon name="x" className="w-6 h-6" /></button></div><div className="overflow-y-auto flex-1 pr-1 space-y-4 hide-scrollbar pb-4 text-left">{budgetForm.map(b => (<div key={b.id} className="bg-slate-900 p-5 rounded-[24px] border border-slate-700 shadow-inner flex flex-col gap-4 relative"><button onClick={() => handleRemoveBudget(b.id)} className="absolute top-4 right-4 text-slate-500 hover:text-rose-400 transition-colors p-1 bg-slate-800 rounded-full"><LucideIcon name="trash-2" className="w-4 h-4" /></button><div className="flex gap-2 w-[85%]"><input type="text" value={b.icon} onChange={e => handleBudgetChange(b.id, 'icon', e.target.value)} className="w-14 h-14 rounded-2xl bg-slate-800 border border-slate-600 text-center text-2xl outline-none focus:border-teal-500" /><input type="text" value={b.category} onChange={e => handleBudgetChange(b.id, 'category', e.target.value)} className="flex-1 h-14 px-4 rounded-2xl bg-slate-800 border border-slate-600 text-white font-bold outline-none focus:border-teal-500" /></div><div className="flex items-center gap-3"><span className="text-sm text-slate-400 font-bold whitespace-nowrap pl-1">목표액</span><div className="relative flex-1"><span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">원</span><input type="number" value={b.amount} onChange={e => handleBudgetChange(b.id, 'amount', e.target.value)} className="w-full h-14 pl-4 pr-10 rounded-2xl bg-slate-800 border border-slate-600 text-teal-400 font-black text-lg outline-none focus:border-teal-500 text-right" /></div></div></div>))}<button onClick={handleAddBudget} className="w-full h-16 rounded-[24px] border-2 border-dashed border-slate-600 text-slate-400 font-bold hover:border-teal-500 hover:text-teal-400 hover:bg-slate-800/50 transition-colors flex items-center justify-center gap-2 mt-4"><LucideIcon name="plus" className="w-5 h-5" /> 새로운 방어 구역 추가</button></div><button onClick={handleSaveBudgets} className="w-full bg-teal-500 text-white font-black text-xl py-4 h-16 rounded-2xl mt-4 shrink-0 active:scale-95 transition-transform shadow-lg">저장하기 🛡️</button></div></div>}

                    {/* 하단 탭 바 */}
                    <div className="fixed bottom-0 left-0 right-0 z-50 pointer-events-none">
                        <nav className="max-w-md mx-auto pointer-events-auto bg-slate-800/90 backdrop-blur-xl border border-slate-700/50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] m-4 rounded-[32px] p-2 flex justify-around items-center pb-safe">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 w-20 py-2 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'text-teal-400 bg-slate-700/50' : 'text-slate-500 hover:text-slate-300'}`}>
                                <LucideIcon name="layout-dashboard" className="w-6 h-6" />
                                <span className="text-[11px] font-bold">홈</span>
                            </button>
                            <button onClick={() => setActiveTab('add')} className="relative -top-8 bg-gradient-to-tr from-teal-600 to-teal-400 w-16 h-16 rounded-full flex items-center justify-center border-4 border-slate-900 shadow-xl active:scale-90 transition-transform"><LucideIcon name="plus" className="text-white w-8 h-8" /></button>
                            <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 w-20 py-2 rounded-2xl transition-all ${activeTab === 'list' ? 'text-teal-400 bg-slate-700/50' : 'text-slate-500 hover:text-slate-300'}`}>
                                <LucideIcon name="list" className="w-6 h-6" />
                                <span className="text-[11px] font-bold">기록장</span>
                            </button>
                        </nav>
                    </div>

                    {/* 모카 커스텀 알림 팝업 */}
                    {mochaPopup.show && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[100] w-[85%] max-w-[320px] animate-in slide-in-from-top fade-in pointer-events-none">
                            <div className={`p-5 rounded-3xl flex items-center gap-4 text-white font-bold relative overflow-hidden ${
                                mochaPopup.type === 'cheer' ? 'popup-cheer' : 
                                mochaPopup.type === 'warning' ? 'popup-warning' : 'popup-info'
                            }`}>
                                <SpriteIcon size={44} className="shrink-0 border-2 border-white/30" />
                                <p className="text-[15px] leading-relaxed break-keep">{mochaPopup.message}</p>
                                <div className="absolute -right-2 -bottom-2 opacity-20"><LucideIcon name={mochaPopup.type === 'warning' ? 'alert-triangle' : 'sparkles'} className="w-12 h-12" /></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
