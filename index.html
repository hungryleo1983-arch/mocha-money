<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모카네가계부 with Jiyoung&Chulhun</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            background-color: #0f172a; /* slate-900 */
        }
        .animate-bounce-gentle { animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        input, select, textarea { font-size: 16px !important; appearance: none; -webkit-appearance: none; }
        .pb-safe { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 20px)); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .scroll-smooth { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useRef } = React;

        // Firebase SDK 임포트
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, addDoc, query, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

        // --- 💡 [보완] 환경 설정: 환경 변수가 있으면 우선 사용, 없으면 사용자 제공 값 사용 ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyBve1WGTCzLUdNJRmeaOhlOrBnBg7yMhgk",
                authDomain: "mocha-money.firebaseapp.com",
                projectId: "mocha-money",
                storageBucket: "mocha-money.firebasestorage.app",
                messagingSenderId: "421934031399",
                appId: "1:421934031399:web:6c222b3f3288bf06d72402"
            };
        const geminiApiKey = "AIzaSyAb_-T47fzJtRlNOGVdlASAUEjGWQceSLc"; 
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : "mocha-family-ledger";

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 상수 및 유틸리티
        const SPRITE_IMAGE_URL = "https://postfiles.pstatic.net/MjAyNjA0MTlfMjIg/MDAxNzc2NTU1MDY3Mzc5.DWJ60DFy2M5vzJ69JjhSD7_xZ6Eh7rqG0BkET3UPWRkg.zr-irwsLHwdyR8cwimsIxW2ucYHLYfvqtCZ2yb-ntFYg.PNG/image.png?type=w966";
        const DEFAULT_ACCOUNTS = ['메인 급여통장', '비상금 통장', '청약 저축', '주식/투자 계좌', '기타'];

        const SpriteIcon = ({ row, col, size = 48, className = "" }) => {
            const xPositions = [0, 50, 100]; 
            const yPositions = [28, 55, 83]; 
            return (
                <div className={`shrink-0 overflow-hidden flex items-center justify-center shadow-inner ${className}`} style={{ width: size, height: size, borderRadius: '50%', backgroundColor: '#fff', mixBlendMode: 'normal' }}>
                    <div style={{ width: '100%', height: '100%', backgroundImage: `url('${SPRITE_IMAGE_URL}')`, backgroundSize: '300% auto', backgroundPosition: `${xPositions[col]}% ${yPositions[row]}%`, backgroundRepeat: 'no-repeat', transform: 'scale(1.45)' }} />
                </div>
            );
        };

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [transactions, setTransactions] = useState([]);
            const currentYear = new Date().getFullYear();
            const defaultGoal = { title: "1억 달성하기 💰", amount: 100000000, deadline: `${currentYear}-12-31` };
            const defaultBudgets = [
                { id: 1, category: '식비', amount: 600000, icon: '🍔' },
                { id: 2, category: '생활', amount: 300000, icon: '🛒' },
                { id: 3, category: '모카', amount: 150000, icon: '🐶' }
            ];
            
            const [settings, setSettings] = useState({ budgets: defaultBudgets, assetAccounts: DEFAULT_ACCOUNTS, goal: defaultGoal });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isAssetPageOpen, setIsAssetPageOpen] = useState(false);
            const [isGoalModalOpen, setIsGoalModalOpen] = useState(false);
            const [goalForm, setGoalForm] = useState(defaultGoal);
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            const [budgetForm, setBudgetForm] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const [loading, setLoading] = useState(true);
            const [mochaPopup, setMochaPopup] = useState({ show: false, message: '', type: 'success' });
            const [newAccountName, setNewAccountName] = useState('');
            const [editingAccount, setEditingAccount] = useState(null);
            const [editAccountName, setEditAccountName] = useState('');
            const fileInputRef = useRef(null);
            const [form, setForm] = useState({ type: 'expense', amount: '', category: '식비', memo: '', date: new Date().toISOString().split('T')[0], account: DEFAULT_ACCOUNTS[0] });

            const showPopup = (message) => {
                setMochaPopup({ show: true, message });
                setTimeout(() => setMochaPopup({ show: false, message: '' }), 3000);
            };

            // --- 💡 [수정] 인증 로직: 토큰 불일치 시 예외 처리 추가 ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenErr) {
                                // 토큰 불일치 또는 만료 시 익명 로그인으로 폴백
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { 
                        console.error("인증 실패:", err); 
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => { 
                    setUser(u); 
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                // RULE 1: 엄격한 Firestore 경로 규칙 준수
                const ledgerRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'ledger');
                const settingsRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'settings', 'global');
                
                const unsubscribeSnap = onSnapshot(ledgerRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setTransactions(data);
                    setLoading(false);
                }, (err) => {
                    console.error("데이터 로드 오류:", err);
                    setLoading(false);
                });

                const unsubscribeSettings = onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        let loadedBudgets = docSnap.data().budgets;
                        if (loadedBudgets && !Array.isArray(loadedBudgets)) {
                            loadedBudgets = defaultBudgets;
                        }
                        setSettings({ 
                            budgets: loadedBudgets || defaultBudgets, 
                            assetAccounts: docSnap.data().assetAccounts || DEFAULT_ACCOUNTS,
                            goal: docSnap.data().goal || defaultGoal
                        });
                    } else {
                        setDoc(settingsRef, settings);
                    }
                });
                return () => { unsubscribeSnap(); unsubscribeSettings(); };
            }, [user]);

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [activeTab, loading, isGoalModalOpen, isBudgetModalOpen, isAssetPageOpen, budgetForm]);

            const currentMonthStr = new Date().toISOString().slice(0, 7);
            const currentMonthTx = transactions.filter(t => t.date && t.date.startsWith(currentMonthStr));
            const monthIncome = currentMonthTx.filter(t => t.type === 'income').reduce((sum, t) => sum + Number(t.amount), 0);
            const monthExpense = currentMonthTx.filter(t => t.type === 'expense').reduce((sum, t) => sum + Number(t.amount), 0);
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + Number(t.amount), 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + Number(t.amount), 0);
            const totalSavings = totalIncome - totalExpense;
            const currentGoal = settings.goal || defaultGoal;
            const goalProgress = Math.max(0, Math.min(100, (totalSavings / currentGoal.amount) * 100));
            const daysLeft = Math.ceil((new Date(currentGoal.deadline) - new Date()) / (1000 * 60 * 60 * 24));

            const getChartData = () => {
                const data = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(); d.setMonth(d.getMonth() - i);
                    const mStr = d.toISOString().slice(0, 7);
                    const mTx = transactions.filter(t => t.date && t.date.startsWith(mStr));
                    data.push({ 
                        label: `${d.getMonth() + 1}월`, 
                        income: mTx.filter(t => t.type === 'income').reduce((sum, t) => sum + Number(t.amount), 0), 
                        expense: mTx.filter(t => t.type === 'expense').reduce((sum, t) => sum + Number(t.amount), 0)
                    });
                }
                return data;
            };
            const chartData = getChartData();
            const maxChartVal = Math.max(...chartData.flatMap(d => [d.income, d.expense]), 100000) * 1.1; 

            const accountBalances = settings.assetAccounts.reduce((acc, accountName) => {
                const accTx = transactions.filter(t => t.account === accountName);
                acc[accountName] = accTx.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0) - accTx.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
                return acc;
            }, {});

            const categoryOptions = Array.from(new Set(['식비', '생활', '교통', '문화', '모카', '수입', '기타', ...(settings.budgets || []).map(b => b.category)]));

            const saveAssetAccounts = async (newAccounts) => {
                const settingsRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'settings', 'global');
                await setDoc(settingsRef, { ...settings, assetAccounts: newAccounts }, { merge: true });
            };
            const handleAddAccount = async () => {
                if (!newAccountName.trim() || settings.assetAccounts.includes(newAccountName.trim())) return;
                await saveAssetAccounts([...settings.assetAccounts, newAccountName.trim()]);
                setNewAccountName('');
                showPopup(`'${newAccountName}' 추가 완료! 🏦`);
            };
            const handleDeleteAccount = async (acc) => {
                await saveAssetAccounts(settings.assetAccounts.filter(a => a !== acc));
                showPopup(`통장 삭제 완료! 🗑️`);
            };
            const handleEditAccount = async (oldName) => {
                if (!editAccountName.trim() || editAccountName.trim() === oldName) { setEditingAccount(null); return; }
                await saveAssetAccounts(settings.assetAccounts.map(a => a === oldName ? editAccountName.trim() : a));
                setEditingAccount(null);
                showPopup(`통장 이름 변경 완료! ✏️`);
            };
            const handleSaveGoal = async (e) => {
                e.preventDefault();
                const settingsRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'settings', 'global');
                await setDoc(settingsRef, { ...settings, goal: { ...goalForm, amount: Number(goalForm.amount) } }, { merge: true });
                setIsGoalModalOpen(false);
                showPopup('가족 목표가 업데이트 되었습니다! 🎯');
            };
            const handleSaveBudgets = async (e) => {
                e.preventDefault();
                const settingsRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'settings', 'global');
                await setDoc(settingsRef, { ...settings, budgets: budgetForm }, { merge: true });
                setIsBudgetModalOpen(false);
                showPopup('집중 방어 구역이 업데이트 되었습니다! 🛡️');
            };
            const handleBudgetChange = (id, field, value) => {
                setBudgetForm(prev => prev.map(b => b.id === id ? { ...b, [field]: field === 'amount' ? Number(value) : value } : b));
            };
            const handleAddBudget = () => { setBudgetForm(prev => [...prev, { id: Date.now(), category: '새 카테고리', amount: 100000, icon: '💡' }]); };
            const handleRemoveBudget = (id) => { setBudgetForm(prev => prev.filter(b => b.id !== id)); };

            const handleManualSubmit = async (e) => {
                e.preventDefault();
                if (!user || !form.amount || !form.memo) return;
                const ledgerRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'ledger');
                await addDoc(ledgerRef, { ...form, amount: Number(form.amount), timestamp: new Date().toISOString(), uid: user.uid });
                setForm({ ...form, amount: '', memo: '', date: new Date().toISOString().split('T')[0] });
                showPopup('기록 추가 완료! 🐾');
                setActiveTab('list');
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0]; 
                if (!file) return; 
                setIsUploading(true);
                showPopup("모카가 영수증을 분석하고 있다멍! 🐶🔍");
                try {
                    const base64Data = await new Promise((resolve) => { 
                        const reader = new FileReader(); 
                        reader.onload = () => resolve(reader.result.split(',')[1]); 
                        reader.readAsDataURL(file); 
                    });
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ 
                            contents: [{ role: "user", parts: [{ text: "Extract receipt info as JSON: {amount: number, date: YYYY-MM-DD, memo: string, category: string}" }, { inlineData: { mimeType: file.type, data: base64Data } }] }], 
                            generationConfig: { responseMimeType: "application/json" } 
                        }) 
                    });
                    const data = JSON.parse(result.candidates[0].content.parts[0].text);
                    let finalCategory = data.category || '기타';
                    if (data.category.includes('식비') || data.category.includes('마트')) finalCategory = '식비';
                    else if (data.category.includes('모카')) finalCategory = '모카';
                    await addDoc(collection(db, 'artifacts', currentAppId, 'public', 'data', 'ledger'), { 
                        type: 'expense', amount: data.amount, memo: data.memo, date: data.date, category: finalCategory, account: settings.assetAccounts[0], timestamp: new Date().toISOString(), uid: user.uid, isAuto: true 
                    });
                    showPopup('영수증 등록 완료! ✨'); setActiveTab('list');
                } catch (e) { showPopup('인식 실패! 직접 입력해 주개! 😢'); } 
                finally { setIsUploading(false); if(fileInputRef.current) fileInputRef.current.value = ''; }
            };

            if (loading && !user) return (
                <div className="flex items-center justify-center h-screen bg-slate-900">
                    <div className="flex flex-col items-center gap-4">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-teal-400"></div>
                        <p className="text-slate-400 font-bold">인증 처리 중...</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-900 shadow-2xl relative scroll-smooth">
                    <header className="px-6 pt-12 pb-4 flex flex-col items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-800 text-center">
                        <h1 className="flex flex-col items-center gap-1.5 leading-tight">
                            <span className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 drop-shadow-md">✨ 모카네가계부</span>
                            <span className="text-sm font-bold text-teal-200/90 flex items-center justify-center gap-1.5 tracking-wide">
                                with Jiyoung <span className="text-rose-400 text-sm animate-pulse">❤️</span> Chulhun
                            </span>
                        </h1>
                    </header>

                    <main className="flex-1 p-5 space-y-7 overflow-y-auto pb-32 hide-scrollbar bg-gradient-to-br from-slate-900 via-slate-800 to-teal-950/20">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-7 animate-in fade-in duration-500">
                                <div className="bg-gradient-to-br from-teal-600 to-sky-700 rounded-[28px] p-6 shadow-[0_8px_30px_rgb(0,0,0,0.3)] border border-teal-500/30 relative overflow-hidden text-left">
                                    <div className="flex justify-between items-start mb-5">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-2">
                                                <p className="text-teal-100 text-sm font-bold opacity-90">🎯 {currentGoal.title}</p>
                                                <button onClick={() => { setGoalForm(currentGoal); setIsGoalModalOpen(true); }} className="text-white/60 hover:text-white transition-colors p-1"><i data-lucide="settings" className="w-4 h-4"></i></button>
                                            </div>
                                            <h2 className="text-4xl font-black tracking-tight">{new Intl.NumberFormat('ko-KR').format(totalSavings)}원</h2>
                                        </div>
                                        <SpriteIcon row={1} col={2} size={64} className="shadow-lg" />
                                    </div>
                                    <div className="w-full bg-slate-900/40 rounded-full h-3.5 mb-2 shadow-inner">
                                        <div className="bg-gradient-to-r from-yellow-500 to-yellow-300 h-full rounded-full relative transition-all duration-1000" style={{width: `${goalProgress}%`}}>
                                            <div className="absolute -right-3 -top-2 text-xl animate-bounce-gentle">🐶</div>
                                        </div>
                                    </div>
                                    <div className="flex justify-between text-[13px] font-bold text-teal-50 mt-3">
                                        <span>{new Intl.NumberFormat('ko-KR').format(currentGoal.amount)}원 목표</span>
                                        <span className="bg-black/20 px-2.5 py-0.5 rounded-full">{goalProgress.toFixed(1)}% (D{daysLeft < 0 ? '+' : '-'}{Math.abs(daysLeft)})</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-left">
                                    <div className="bg-slate-800/90 p-5 rounded-[24px] border border-slate-700 flex flex-col gap-2 shadow-lg">
                                        <p className="text-sky-400 text-sm font-bold flex items-center gap-1.5"><i data-lucide="arrow-down-circle" className="w-4 h-4"></i> 총 누적 수입</p>
                                        <p className="text-xl font-bold tracking-tight">{new Intl.NumberFormat('ko-KR').format(totalIncome)}원</p>
                                        <div className="border-t border-slate-700/80 pt-2.5 mt-1.5"><p className="text-slate-400 text-[11px] mb-1">이번 달 수입</p><p className="text-[15px] font-bold text-sky-200">{new Intl.NumberFormat('ko-KR').format(monthIncome)}원</p></div>
                                    </div>
                                    <div className="bg-slate-800/90 p-5 rounded-[24px] border border-slate-700 flex flex-col gap-2 shadow-lg">
                                        <p className="text-rose-400 text-sm font-bold flex items-center gap-1.5"><i data-lucide="arrow-up-circle" className="w-4 h-4"></i> 총 누적 지출</p>
                                        <p className="text-xl font-bold tracking-tight">{new Intl.NumberFormat('ko-KR').format(totalExpense)}원</p>
                                        <div className="border-t border-slate-700/80 pt-2.5 mt-1.5"><p className="text-slate-400 text-[11px] mb-1">이번 달 지출</p><p className="text-[15px] font-bold text-rose-200">{new Intl.NumberFormat('ko-KR').format(monthExpense)}원</p></div>
                                    </div>
                                </div>
                                <button onClick={() => setIsAssetPageOpen(true)} className="w-full py-5 rounded-[24px] flex items-center justify-between px-6 font-bold border border-slate-700 bg-slate-800 shadow-md active:scale-95 transition-all">
                                    <span className="text-teal-400 flex items-center gap-3 text-lg"><i data-lucide="building-2" className="w-6 h-6"></i> 내 자산 관리 (통장/주식)</span>
                                    <i data-lucide="chevron-right" className="w-5 h-5 text-slate-400"></i>
                                </button>
                                <div className="bg-slate-800/90 rounded-[28px] p-6 border border-slate-700 shadow-lg text-left">
                                    <div className="flex justify-between items-center mb-6"><h3 className="text-base font-bold flex items-center gap-2"><SpriteIcon row={1} col={1} size={28} /> 집중 방어 구역 (예산)</h3><button onClick={() => { setBudgetForm(settings.budgets); setIsBudgetModalOpen(true); }} className="text-slate-400 hover:text-white transition-colors p-2 -mr-2"><i data-lucide="settings" className="w-5 h-5"></i></button></div>
                                    <div className="space-y-5">
                                        {settings.budgets.map((b) => {
                                            const spent = currentMonthTx.filter(t => t.type === 'expense' && t.category === b.category).reduce((sum, t) => sum + Number(t.amount), 0);
                                            const isOver = spent > b.amount;
                                            const percent = Math.min(100, (spent / b.amount) * 100) || 0;
                                            return (
                                                <div key={b.id}>
                                                    <div className="flex justify-between text-[15px] mb-2 font-bold"><span className="text-slate-200">{b.icon} {b.category}</span><span className={isOver ? 'text-rose-400' : 'text-teal-400'}>{new Intl.NumberFormat('ko-KR').format(spent)} <span className="text-slate-500 text-xs font-normal">/ {new Intl.NumberFormat('ko-KR').format(b.amount)}</span></span></div>
                                                    <div className="h-3 bg-slate-900 rounded-full overflow-hidden border border-slate-700/50"><div className={`h-full rounded-full transition-all duration-500 ${isOver ? 'bg-rose-500' : 'bg-teal-500'}`} style={{width: `${percent}%`}}></div></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                <div className="bg-slate-800/90 rounded-[28px] p-6 border border-slate-700 shadow-lg text-left">
                                    <h3 className="text-base font-bold flex items-center gap-2 mb-6"><i data-lucide="bar-chart-3" className="w-5 h-5 text-teal-400"></i> 최근 6개월 흐름</h3>
                                    <div className="flex items-end justify-between h-40 gap-1 mt-4">
                                        {chartData.map((d, i) => (
                                            <div key={i} className="flex flex-col items-center flex-1 gap-2 h-full"><div className="flex w-full gap-1 items-end justify-center h-full relative group"><div className="w-[45%] bg-sky-500 rounded-t-md opacity-80" style={{ height: `${(d.income / maxChartVal) * 100}%`, minHeight: '4px' }}></div><div className="w-[45%] bg-rose-500 rounded-t-md opacity-80" style={{ height: `${(d.expense / maxChartVal) * 100}%`, minHeight: '4px' }}></div></div><span className="text-[11px] font-bold text-slate-400 whitespace-nowrap">{d.label}</span></div>
                                        ))}
                                    </div>
                                    <div className="flex justify-center gap-5 mt-5 text-sm font-bold text-slate-300"><span className="flex items-center gap-1.5"><span className="w-3 h-3 bg-sky-500 rounded-full shadow-sm"></span>수입</span><span className="flex items-center gap-1.5"><span className="w-3 h-3 bg-rose-500 rounded-full shadow-sm"></span>지출</span></div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'add' && (
                            <div className="space-y-7 animate-in zoom-in-95 duration-300 pt-2 text-left">
                                <h3 className="font-black text-3xl mb-4">기록하기 ✍️</h3>
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 rounded-[28px] shadow-xl relative overflow-hidden flex items-center justify-between">
                                    <div className="pr-4"><p className="font-black text-white text-lg mb-1">영수증이 있나요?</p><p className="text-sm text-indigo-200">AI 모카가 알아서 다~ 입력해 줄게요!</p></div>
                                    <button onClick={() => fileInputRef.current?.click()} disabled={isUploading} className="shrink-0 w-14 h-14 bg-white rounded-full flex items-center justify-center text-indigo-600 shadow-lg active:scale-90 transition-all">{isUploading ? <div className="animate-spin rounded-full h-6 w-6 border-t-2 border-indigo-600"></div> : <i data-lucide="camera" className="w-7 h-7"></i>}</button>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*" className="hidden" />
                                </div>
                                <div className="flex items-center my-6"><div className="flex-1 border-t border-slate-700"></div><span className="px-4 text-slate-500 text-sm font-bold">또는 직접 입력</span><div className="flex-1 border-t border-slate-700"></div></div>
                                <form onSubmit={handleManualSubmit} className="space-y-5">
                                    <div className="flex bg-slate-800 p-1.5 rounded-2xl border border-slate-700 shadow-inner"><button type="button" onClick={() => setForm({...form, type: 'expense'})} className={`flex-1 py-3.5 rounded-xl text-lg font-black transition-all ${form.type === 'expense' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-400'}`}>지출</button><button type="button" onClick={() => setForm({...form, type: 'income'})} className={`flex-1 py-3.5 rounded-xl text-lg font-black transition-all ${form.type === 'income' ? 'bg-sky-500 text-white shadow-md' : 'text-slate-400'}`}>수입</button></div>
                                    <div className="space-y-4">
                                        <div className="relative"><i data-lucide="wallet" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><select value={form.account} onChange={e => setForm({...form, account: e.target.value})} className="w-full pl-12 pr-4 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 text-slate-200 outline-none focus:border-teal-500 shadow-sm">{settings.assetAccounts.map(acc => <option key={acc} value={acc}>{acc}</option>)}</select></div>
                                        <div className="relative"><span className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">원</span><input type="number" placeholder="금액 입력" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} className="w-full pl-5 pr-10 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-teal-500 text-xl font-black shadow-sm placeholder:font-normal" /></div>
                                        <input type="text" placeholder="내역을 입력하세요" value={form.memo} onChange={e => setForm({...form, memo: e.target.value})} className="w-full px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-teal-500 shadow-sm" />
                                        <div className="grid grid-cols-2 gap-4"><select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 text-slate-200 outline-none focus:border-teal-500 shadow-sm">{categoryOptions.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select><input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="px-5 py-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 text-slate-200 outline-none focus:border-teal-500 shadow-sm" /></div>
                                    </div>
                                    <button type="submit" className="w-full mt-8 py-5 h-16 bg-teal-500 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">기록 저장하기 🐶</button>
                                </form>
                            </div>
                        )}
                        {activeTab === 'list' && (
                            <div className="space-y-5 animate-in slide-in-from-right-4 duration-300 pt-2 text-left">
                                <h3 className="font-black text-3xl mb-6">최근 기록장 📑</h3>
                                {transactions.length === 0 ? <div className="text-center py-20 bg-slate-800/50 rounded-3xl border border-slate-700 border-dashed"><p className="text-4xl mb-3">📭</p><p className="text-slate-400 font-bold">아직 기록이 없다멍!</p></div> : transactions.map(t => (
                                    <div key={t.id} className="bg-slate-800 p-5 rounded-[24px] border border-slate-700 shadow-md flex justify-between items-center group"><div className="flex-1 pr-4"><div className="flex items-center gap-2 mb-1.5"><p className="text-[11px] text-slate-400 font-bold">{t.date}</p><span className="text-[10px] bg-slate-900 border border-slate-700 px-2 py-0.5 rounded-full text-slate-300">{t.account}</span></div><p className="font-bold text-slate-100 text-[17px] mb-1.5 leading-tight">{t.memo} {t.isAuto && <span className="text-[10px] bg-indigo-500/20 text-indigo-300 px-1.5 py-0.5 rounded ml-1">✨ AI</span>}</p><span className="text-[11px] bg-teal-500/10 text-teal-300 px-2.5 py-1 rounded-md font-bold">{t.category}</span></div><p className={`text-xl font-black shrink-0 ${t.type === 'income' ? 'text-sky-400' : 'text-rose-400'}`}>{t.type === 'income' ? '+' : '-'}{new Intl.NumberFormat('ko-KR').format(t.amount)}</p></div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* 오버레이 및 모달 */}
                    {isAssetPageOpen && <div className="fixed inset-0 z-[60] bg-slate-900 overflow-y-auto p-6 pt-12 animate-in slide-in-from-bottom duration-300"><button onClick={() => setIsAssetPageOpen(false)} className="mb-6 flex items-center gap-2 text-teal-400 font-bold py-2"><i data-lucide="arrow-left"></i> 대시보드로 돌아가기</button><h2 className="text-3xl font-black mb-8">내 자산 리스트 💰</h2><div className="flex gap-2 mb-8"><input type="text" placeholder="새 자산 추가" value={newAccountName} onChange={(e) => setNewAccountName(e.target.value)} className="flex-1 p-4 h-14 rounded-2xl bg-slate-800 border border-slate-700 text-slate-100 focus:border-teal-500 outline-none shadow-inner" /><button onClick={handleAddAccount} className="bg-teal-500 text-white px-6 h-14 rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">추가</button></div><div className="space-y-4 pb-20">{settings.assetAccounts.map(acc => <div key={acc} className="p-5 bg-slate-800 border border-slate-700 rounded-[24px] flex flex-col gap-3 shadow-lg">{editingAccount === acc ? <div className="flex gap-2 w-full"><input type="text" value={editAccountName} onChange={(e) => setEditAccountName(e.target.value)} className="flex-1 p-3 h-12 rounded-xl bg-slate-900 border border-slate-600 text-slate-100 outline-none" autoFocus /><button onClick={() => handleEditAccount(acc)} className="bg-teal-500 text-white w-12 h-12 rounded-xl shadow-md flex items-center justify-center"><i data-lucide="check" className="w-5 h-5"></i></button><button onClick={() => setEditingAccount(null)} className="bg-slate-600 text-white w-12 h-12 rounded-xl flex items-center justify-center"><i data-lucide="x" className="w-5 h-5"></i></button></div> : <><div className="flex justify-between items-center w-full"><div className="flex items-center gap-3.5"><div className="w-12 h-12 bg-slate-900 border border-slate-700 rounded-full flex items-center justify-center text-2xl shadow-inner">🏦</div><span className="font-bold text-[17px]">{acc}</span></div><span className="text-xl font-black text-teal-400">{new Intl.NumberFormat('ko-KR').format(accountBalances[acc]||0)}원</span></div><div className="flex justify-end gap-4 mt-2 border-t border-slate-700/80 pt-3.5"><button onClick={() => { setEditingAccount(acc); setEditAccountName(acc); }} className="text-slate-400 hover:text-teal-400 flex items-center gap-1.5 text-sm font-bold p-1"><i data-lucide="edit-2" className="w-4 h-4"></i> 수정</button><button onClick={() => handleDeleteAccount(acc)} className="text-slate-400 hover:text-rose-400 flex items-center gap-1.5 text-sm font-bold p-1"><i data-lucide="trash-2" className="w-4 h-4"></i> 삭제</button></div></>}</div>)}</div></div>}
                    {isGoalModalOpen && <div className="fixed inset-0 z-[70] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-5 animate-in fade-in"><div className="bg-slate-800 border border-slate-700 p-7 rounded-[32px] shadow-2xl w-full max-w-sm"><div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-left">🎯 우리가족 목표 설정</h3><button onClick={() => setIsGoalModalOpen(false)} className="text-slate-400 hover:text-white p-1"><i data-lucide="x"></i></button></div><form onSubmit={handleSaveGoal} className="space-y-5 text-left"><div><label className="text-sm text-slate-300 font-bold mb-2 block">어떤 목표인가요?</label><input type="text" value={goalForm.title} onChange={e => setGoalForm({...goalForm, title: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 shadow-inner" required /></div><div><label className="text-sm text-slate-300 font-bold mb-2 block">목표 금액 (원)</label><input type="number" value={goalForm.amount} onChange={e => setGoalForm({...goalForm, amount: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 font-bold text-lg shadow-inner" required /></div><div><label className="text-sm text-slate-300 font-bold mb-2 block">목표 날짜</label><input type="date" value={goalForm.deadline} onChange={e => setGoalForm({...goalForm, deadline: e.target.value})} className="w-full p-4 h-14 rounded-2xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-teal-500 shadow-inner" required /></div><button type="submit" className="w-full bg-teal-500 text-white font-black text-xl py-4 h-16 rounded-2xl mt-4 active:scale-95 transition-transform shadow-lg">저장하기 🐾</button></form></div></div>}
                    {isBudgetModalOpen && <div className="fixed inset-0 z-[70] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in pt-safe"><div className="bg-slate-800 border border-slate-700 p-6 rounded-[32px] shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col"><div className="flex justify-between items-center mb-6 shrink-0 pt-2 text-left"><h3 className="font-black text-2xl flex items-center gap-2">🛡️ 예산 방어 설정</h3><button onClick={() => setIsBudgetModalOpen(false)} className="text-slate-400 hover:text-white p-1"><i data-lucide="x" className="w-6 h-6"></i></button></div><div className="overflow-y-auto flex-1 pr-1 space-y-4 hide-scrollbar pb-4 text-left">{budgetForm.map(b => (<div key={b.id} className="bg-slate-900 p-5 rounded-[24px] border border-slate-700 shadow-inner flex flex-col gap-4 relative"><button onClick={() => handleRemoveBudget(b.id)} className="absolute top-4 right-4 text-slate-500 hover:text-rose-400 transition-colors p-1 bg-slate-800 rounded-full"><i data-lucide="trash-2" className="w-4 h-4"></i></button><div className="flex gap-2 w-[85%]"><input type="text" value={b.icon} onChange={e => handleBudgetChange(b.id, 'icon', e.target.value)} className="w-14 h-14 rounded-2xl bg-slate-800 border border-slate-600 text-center text-2xl outline-none focus:border-teal-500" /><input type="text" value={b.category} onChange={e => handleBudgetChange(b.id, 'category', e.target.value)} className="flex-1 h-14 px-4 rounded-2xl bg-slate-800 border border-slate-600 text-white font-bold outline-none focus:border-teal-500" /></div><div className="flex items-center gap-3"><span className="text-sm text-slate-400 font-bold whitespace-nowrap pl-1">목표액</span><div className="relative flex-1"><span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">원</span><input type="number" value={b.amount} onChange={e => handleBudgetChange(b.id, 'amount', e.target.value)} className="w-full h-14 pl-4 pr-10 rounded-2xl bg-slate-800 border border-slate-600 text-teal-400 font-black text-lg outline-none focus:border-teal-500 text-right" /></div></div></div>))}<button onClick={handleAddBudget} className="w-full h-16 rounded-[24px] border-2 border-dashed border-slate-600 text-slate-400 font-bold hover:border-teal-500 hover:text-teal-400 hover:bg-slate-800/50 transition-colors flex items-center justify-center gap-2 mt-4"><i data-lucide="plus" className="w-5 h-5"></i> 새로운 방어 구역 추가</button></div><button onClick={handleSaveBudgets} className="w-full bg-teal-500 text-white font-black text-xl py-4 h-16 rounded-2xl mt-4 shrink-0 active:scale-95 transition-transform shadow-lg">저장하기 🛡️</button></div></div>}

                    {/* 하단 탭 바 */}
                    <div className="fixed bottom-0 left-0 right-0 z-50 pointer-events-none">
                        <nav className="max-w-md mx-auto pointer-events-auto bg-slate-800/90 backdrop-blur-xl border border-slate-700/50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] m-4 rounded-[32px] p-2 flex justify-around items-center pb-safe">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 w-20 py-2 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'text-teal-400 bg-slate-700/50' : 'text-slate-500'}`}><i data-lucide="layout-dashboard" className="w-6 h-6"></i><span className="text-[11px] font-bold">홈</span></button>
                            <button onClick={() => setActiveTab('add')} className="relative -top-8 bg-gradient-to-tr from-teal-600 to-teal-400 w-16 h-16 rounded-full flex items-center justify-center border-4 border-slate-900 shadow-xl active:scale-90 transition-transform"><i data-lucide="plus" className="text-white w-8 h-8"></i></button>
                            <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 w-20 py-2 rounded-2xl transition-all ${activeTab === 'list' ? 'text-teal-400 bg-slate-700/50' : 'text-slate-500'}`}><i data-lucide="list" className="w-6 h-6"></i><span className="text-[11px] font-bold">기록장</span></button>
                        </nav>
                    </div>

                    {mochaPopup.show && <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[100] w-auto whitespace-nowrap animate-in slide-in-from-top fade-in"><div className="bg-teal-500 text-white px-6 py-4 rounded-full shadow-2xl text-center font-bold text-lg">{mochaPopup.message}</div></div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
